<!doctype html>
<html><head><meta charset="utf-8"/><title>Bunker Elite Visual</title>
<style>
body{margin:0;background:#060a12;color:#d8f6ff;font-family:Arial,sans-serif}
.top{padding:18px;background:linear-gradient(90deg,#071019,#0c1626,#071019);border-bottom:1px solid rgba(0,255,200,.15)}
.title{font-size:28px;font-weight:800;letter-spacing:1px;color:#92f5ff;text-shadow:0 0 14px rgba(146,245,255,.35)}
.wrap{padding:20px}.card{background:rgba(9,15,25,.85);border:1px solid rgba(0,255,200,.15);border-radius:18px;padding:16px;box-shadow:0 0 20px rgba(0,255,200,.08)}#chart{height:620px}.wm{position:fixed;right:20px;bottom:12px;color:rgba(145,242,255,.18);font-weight:800;font-size:18px}
</style></head>
<body>
<div class="top"><div class="title">BUNKER ELITE VISUAL</div></div>
<div class="wrap"><div class="card"><div id="chart"></div><p>Meli del Ro</p></div></div>
<div class="wm">Meli del Ro</div>
<script type="module">
import { createChart } from 'https://unpkg.com/lightweight-charts/dist/lightweight-charts.production.mjs';
const chart = createChart(document.getElementById('chart'), {layout:{background:{color:'#060a12'},textColor:'#d8f6ff'},grid:{vertLines:{color:'rgba(255,255,255,.05)'},horzLines:{color:'rgba(255,255,255,.05)'}},width:window.innerWidth-60,height:620});
const candleSeries = chart.addCandlestickSeries();
candleSeries.setData([{ time:'2026-03-18', open:100, high:110, low:95, close:108 },{ time:'2026-03-19', open:108, high:114, low:104, close:112 }]);
const emaSeries = chart.addLineSeries({ lineWidth: 2 });
emaSeries.setData([{ time:'2026-03-18', value:104 },{ time:'2026-03-19', value:109 }]);
window.addEventListener('resize', ()=>chart.applyOptions({ width: window.innerWidth - 60 }));
</script></body></html>
